name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.12']

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install black flake8 mypy pytest pytest-cov

      - name: Download NLTK data
        run: |
          uv run python -c "import nltk; nltk.download('punkt'); nltk.download('punkt_tab')"

      - name: Lint with flake8
        run: |
          uv run flake8 src/ main.py \
            --count --select=E9,F63,F7,F82 \
            --show-source --statistics

          uv run flake8 src/ main.py \
            --count --exit-zero \
            --max-complexity=10 \
            --max-line-length=100 \
            --statistics

      - name: Type check with mypy
        run: uv run mypy src/ --ignore-missing-imports --no-error-summary || true

      - name: Run tests with pytest
        run: uv run pytest tests.py -v --cov=src --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  format-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv sync --all-extras
          uv pip install black

      - name: Check code formatting with black
        run: uv run black --check src/ main.py
